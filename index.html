<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>温馨小镇</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>🌿 温馨小镇</h1>
        <p class="subtitle">治愈系生活模拟 · 农耕经营 · 社交成长 · 小镇建设</p>
      </header>
      <section class="play-shell">
        <aside class="tips-card">
          <h2>今日玩法节奏</h2>
          <ul>
            <li>🌅 看农田成熟情况</li>
            <li>🚜 播种 / 浇水 / 收获</li>
            <li>🪵 采集与钓鱼赚钱</li>
            <li>🛒 商店交易与投资升级</li>
            <li>💬 聊天送礼提升好感</li>
          </ul>
        </aside>
        <canvas id="gameCanvas" width="800" height="480" aria-label="游戏画布"></canvas>
      </section>
      <p class="hint">
        <kbd>Enter</kbd> 开始 &nbsp;
        <kbd>WASD</kbd>/<kbd>方向键</kbd> 移动 &nbsp;
        <kbd>E</kbd> 互动/对话 &nbsp;
        <kbd>G</kbd> 送礼 &nbsp;
        <kbd>Q</kbd> 切换种子 &nbsp;
        <kbd>J</kbd> 小镇手帐 &nbsp;
        <kbd>I</kbd> 背包 &nbsp;
        <kbd>空格</kbd> 钓鱼 &nbsp;
        <kbd>Tab</kbd> 商店切换 &nbsp;
        <kbd>走到边界</kbd> 地图切换 &nbsp;
        <kbd>F5</kbd> 存档
      </p>
    </main>
    <script type="module">
      import { CozyPrototypeGame } from "./src/game.js";
      const canvas = document.getElementById("gameCanvas");
      const game = new CozyPrototypeGame(canvas);
      game.start();
    </script>
  </body>
</html>
